# Use Node 20 or the version matching your local environment
image: node:20-slim

# Cache npm dependencies to speed up subsequent builds
cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

before_script:
  - npm install --cache .npm --prefer-offline

pages:
  stage: deploy
  script:
    - npm run build
    # GitLab Pages expects files to be in a folder named 'public'
    # Vite defaults its output to 'dist'
    - mv dist public
    # Fix for React Router: redirect all 404s to index.html
    # so the app can handle the route client-side
    - cp public/index.html public/404.html
  artifacts:
    paths:
      - public
  only:
    - main # or 'master' depending on your default branch name
